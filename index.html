<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>nbaxp.github.io</title>
</head>

<body>
    <div id="app" class="container-lg px-3 my-5 markdown-body">
    </div>
    <script src="lib/jquery/jquery.min.js"></script>
    <script src="lib/commonmark/commonmark.min.js"></script>
    <script src="lib/mermaid/mermaid.min.js"></script>
    <script>
        window.onhashchange = function () {
            if (window.location.hash.length > 1 && window.location.hash.indexOf("#_") !== 0) {
                fetch(window.location.hash.substr(1))
                    .then(o => o.text())
                    .then(o => {
                        document.getElementById('app').innerHTML = new commonmark.HtmlRenderer().render(new commonmark.Parser().parse(o));
                    });
            }
        };
        $('#app').on('click', "a[href$='.md']", function () {
            window.location.hash = $(this).attr('href');
            return false;
        });
        if (window.location.hash === '') {
            window.location.hash = "README.md"
        }
        else {
            window.onhashchange();
        }
    </script>
</body>

</html>
