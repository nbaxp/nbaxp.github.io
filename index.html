<html>

<head>
    <title>nbaxp.github.io</title>
</head>

<body>
    <div id="app">
    </div>
    <script src="lib/jquery/jquery.min.js"></script>
    <script src="lib/commonmark/commonmark.min.js"></script>
    <script src="lib/vue/vue.min.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                md: 'README.md'
            },
            mounted: function () {
                $('#app').on('click', 'a', function () {
                    app.md = $(this).attr('href');
                    return false;
                });
                var app = this;
                window.onhashchange = app.update;
                if (!window.location.hash) {
                    window.location.hash = app.md;
                }
            },
            watch: {
                md: function (md) {
                    window.location.hash = md;
                }
            },
            methods: {
                update: function () {
                    fetch(window.location.hash)
                        .then(o => o.text())
                        .then(o => {
                            document.getElementById('app').innerHTML = new commonmark.HtmlRenderer().render(new commonmark.Parser().parse(o));
                        });
                }
            }
        });
    </script>
</body>

</html>
